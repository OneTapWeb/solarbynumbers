# /etc/nginx/sites-available/solarbynumbers.co.uk
# Static Astro site. Canonical host = apex (solarbynumbers.co.uk); www redirects.
# Cert lines get added/managed by: certbot --nginx -d solarbynumbers.co.uk -d www.solarbynumbers.co.uk

server {
    server_name solarbynumbers.co.uk www.solarbynumbers.co.uk;
    root /var/www/solarbynumbers.co.uk;
    index index.html;

    # Redirect www to apex
    if ($host = www.solarbynumbers.co.uk) {
        return 301 https://solarbynumbers.co.uk$request_uri;
    }

    # HTML — never cache (stats change nightly)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Hashed assets from Astro (/_astro/) are content-addressed — cache hard
    location /_astro/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Other static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|json|yaml|jq)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    listen 80;
    listen [::]:80;
}
